name: Build v8dasm (Electron 34 / V8 13.2.152.41)

on:
  workflow_dispatch:
    inputs:
      decompile_samples:
        description: 'After build, decompile samples/*.jsc with View8'
        required: false
        default: true
        type: boolean

concurrency:
  group: electron34-v8dasm-${{ github.ref }}
  cancel-in-progress: true

env:
  V8_VERSION: "13.2.152.41"
  ELECTRON_BUILD_ARGS: >-
    v8_enable_pointer_compression=true
    v8_enable_sandbox=true
    v8_wasm_random_fuzzers=false
    v8_enable_fuzztest=false
    v8_promise_internal_field_count=1
    v8_embedder_string="-electron.0"
    v8_enable_snapshot_native_code_counters=false
    v8_enable_javascript_promise_hooks=true
    v8_enable_private_mapping_fork_optimization=true
    v8_expose_public_symbols=true

jobs:
  build-v8dasm-windows:
    name: Windows x64 v8dasm
    runs-on: windows-2022
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache depot_tools
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/depot_tools
          key: depot-tools-win-${{ runner.os }}-v2

      - name: Cache V8 source tree
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/v8
          key: v8-source-${{ env.V8_VERSION }}-windows-v2

      - name: Prepare cache-friendly paths
        shell: pwsh
        run: |
          $dt = "${{ runner.temp }}/depot_tools"
          $v8 = "${{ runner.temp }}/v8"
          New-Item -ItemType Directory -Force -Path $dt, $v8 | Out-Null

          foreach ($pair in @(
            @{ Name = 'depot_tools'; Target = $dt },
            @{ Name = 'v8'; Target = $v8 }
          )) {
            $link = Join-Path $env:USERPROFILE $pair.Name
            if (Test-Path $link) { Remove-Item $link -Recurse -Force }
            New-Item -ItemType Junction -Path $link -Target $pair.Target | Out-Null
          }

          Write-Host "depot_tools gclient.bat: $(Test-Path (Join-Path $dt 'gclient.bat'))"
          Write-Host "v8 checkout .git: $(Test-Path (Join-Path $v8 'v8\.git'))"

      - name: Build v8dasm
        shell: cmd
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          call scripts\v8dasm-builders\build-windows-electron34.cmd > build-step.log 2>&1
          set BUILD_EXIT=%ERRORLEVEL%
          type build-step.log
          if %BUILD_EXIT% neq 0 exit /b %BUILD_EXIT%
          if not exist "Bin\%V8_VERSION%.exe" (
            echo ERROR: missing staged binary Bin\%V8_VERSION%.exe
            exit /b 1
          )

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            patch-state.log
            build-step.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stage View8 binary layout
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "Bin\$env:V8_VERSION.exe"
          if (-not (Test-Path $src)) {
            $fallback = Join-Path $env:USERPROFILE "v8\v8\v8dasm-$env:V8_VERSION.exe"
            Write-Host "Workspace binary missing, trying fallback: $fallback"
            if (Test-Path $fallback) {
              New-Item -ItemType Directory -Force -Path Bin | Out-Null
              Copy-Item $fallback $src
            }
          }
          if (-not (Test-Path $src)) {
            Write-Host "USERPROFILE v8 tree:"
            Get-ChildItem (Join-Path $env:USERPROFILE 'v8') -Recurse -Filter 'v8dasm*.exe' -ErrorAction SilentlyContinue | Format-Table FullName, Length
            throw "v8dasm binary not found at $src"
          }
          Get-Item $src | Format-List Name, Length, FullName

      - name: Smoke test on sample preload
        shell: pwsh
        run: |
          $exe = "Bin\${{ env.V8_VERSION }}.exe"
          $jsc = "samples\preload-index.jsc"
          if (-not (Test-Path $jsc)) { throw "Missing $jsc" }
          $out = "${{ runner.temp }}\preload.dis.txt"
          & $exe $jsc | Out-File -FilePath $out -Encoding utf8
          if (-not (Select-String -Path $out -Pattern "Start SharedFunctionInfo" -Quiet)) {
            throw "v8dasm output missing Start SharedFunctionInfo — deserialization failed"
          }
          Write-Host "Smoke test OK: $($out) ($((Get-Item $out).Length) bytes)"

      - name: Upload v8dasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8dasm-windows-${{ env.V8_VERSION }}-electron34
          path: |
            Bin/${{ env.V8_VERSION }}.exe
            Disassembler/v8dasm.cpp
          retention-days: 90

  decompile-samples:
    name: View8 decompile samples
    needs: build-v8dasm-windows
    if: ${{ inputs.decompile_samples != false }}
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install View8 Python deps
        run: pip install parse setuptools

      - name: Download v8dasm
        uses: actions/download-artifact@v4
        with:
          name: v8dasm-windows-${{ env.V8_VERSION }}-electron34
          path: artifact

      - name: Run View8 on samples
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Bin, output | Out-Null
          Copy-Item "artifact\${{ env.V8_VERSION }}.exe" "Bin\${{ env.V8_VERSION }}.exe"
          $dis = Resolve-Path "Bin\${{ env.V8_VERSION }}.exe"
          Get-ChildItem samples\*.jsc | ForEach-Object {
            $out = "output\$($_.BaseName).decompiled.js"
            Write-Host "Decompiling $($_.Name) -> $out"
            python view8.py $_.FullName $out -p $dis
            if (-not (Test-Path $out)) { throw "Missing output $out" }
            Get-Item $out | Format-List Name, Length
          }

      - name: Upload decompiled JS
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-js-electron34
          path: output/*.decompiled.js
          retention-days: 90

      - name: Summary
        shell: pwsh
        run: |
          Write-Host "## Decompile results" >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem output\*.decompiled.js | ForEach-Object {
            $lines = (Get-Content $_.FullName | Measure-Object -Line).Lines
            Write-Host "- $($_.Name): $lines lines" >> $env:GITHUB_STEP_SUMMARY
          }
